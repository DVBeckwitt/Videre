# This is a basic workflow to help you get started with Actions
name: Release

permissions:
  contents: write

# Controls when the workflow will run
on:
  push:
    tags:
     - '*'

 # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
env:
  ANDROID_KEY_FILE: /tmp/key.properties

  # A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    name: flutter release
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    #env:
    #  JAVA_VERSION: "11.0"
    #  FLUTTER_VERSION: "2.5.3"
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'adopt'
      - uses: cachix/install-nix-action@v22
        with:
          nix_path: nixpkgs=channel:nixos-23.11
      - name: Configure release signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          umask 077
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > /tmp/keystore.jks
          printf 'storeFile=/tmp/keystore.jks\n' > "$ANDROID_KEY_FILE"
          printf 'storePassword=%s\n' "$STORE_PASSWORD" >> "$ANDROID_KEY_FILE"
          printf 'keyPassword=%s\n' "$KEY_PASSWORD" >> "$ANDROID_KEY_FILE"
          printf 'keyAlias=%s\n' "$KEY_ALIAS" >> "$ANDROID_KEY_FILE"
          printf '%s' "$STORE_PASSWORD" > /tmp/store-password.txt
          printf '%s' "$KEY_PASSWORD" > /tmp/key-password.txt
      - run: git submodule init
      - run: git submodule update
      - run: set -e
      - run: cp -R ./ /tmp/build
      - name: Build app
        working-directory: /tmp/build
        run: |
          git submodule init
          git submodule update
          export PUB_CACHE=$(pwd)/.pub-cache
          ./submodules/flutter/bin/flutter doctor
          ./submodules/flutter/bin/flutter config --no-analytics
          ./submodules/flutter/bin/flutter pub get
          ./submodules/flutter/bin/flutter pub run flutter_native_splash:create
          ./submodules/flutter/bin/flutter build apk --split-per-abi
          ./submodules/flutter/bin/flutter build apk
          ./submodules/flutter/bin/flutter build appbundle
      - name: Moving build artifacts
        run: | 
          mkdir -p build/app/outputs/flutter-apk
          mkdir -p build/app/outputs/bundle/release
          cp /tmp/build/build/app/outputs/flutter-apk/* build/app/outputs/flutter-apk/
          cp /tmp/build/build/app/outputs/bundle/release/* build/app/outputs/bundle/release/
      - name: Create apks file for accrescent
        env:
          BUNDLETOOL_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: nix-shell nix/bundletool.nix --run 'bundletool build-apks --bundle=build/app/outputs/bundle/release/app-release.aab --output=build/app/outputs/bundle/release/app-release.apks --ks-pass=file:/tmp/store-password.txt --ks=/tmp/keystore.jks --ks-key-alias="$BUNDLETOOL_KEY_ALIAS" --key-pass=file:/tmp/key-password.txt --aapt2=$(which aapt2)'
      - run: ls build/app/outputs/flutter-apk/
      - run: ls build/app/outputs/bundle/release/
      - name: Publish latest GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            build/app/outputs/flutter-apk/*.apk \
            build/app/outputs/bundle/release/* \
            --verify-tag \
            --generate-notes \
            --title "$GITHUB_REF_NAME" \
            --latest
