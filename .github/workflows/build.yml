name: Build

on:
  push:
    branches: [master]
    paths-ignore:
      - '**/README.md'
  pull_request:
    branches: [master]

  workflow_dispatch:

jobs:
  release-script:
    name: release script safety tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test Windows release script
        shell: pwsh
        run: ./tools/build_android_release.Tests.ps1

  build:
    name: flutter analyze and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'adopt'
      - uses: cachix/install-nix-action@v22
        with:
          nix_path: nixpkgs=channel:nixos-23.11
      - run: git submodule init
      - run: git submodule update
      - run: ./submodules/flutter/bin/flutter doctor
      - run: ./submodules/flutter/bin/flutter config --no-analytics
      - run: ./submodules/flutter/bin/flutter pub get
      - run: ./submodules/flutter/bin/dart format --output=none --set-exit-if-changed ./lib ./test/videos/state/video_test.dart ./test/utils/file_db_test.dart
      - run: ./submodules/flutter/bin/dart analyze --no-fatal-warnings ./lib
      - run: ./submodules/flutter/bin/dart analyze --fatal-infos ./test/videos/state/video_test.dart ./test/utils/file_db_test.dart
      - run: ./submodules/flutter/bin/flutter test test/widget_test.dart test/utils/image_object_test.dart test/utils/file_db_test.dart test/videos/state/video_test.dart
      - run: ./submodules/flutter/bin/flutter pub run flutter_native_splash:create
      - run: ./submodules/flutter/bin/flutter build apk --profile --split-per-abi
      - name: Archive build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apks
          path: build/app/outputs/flutter-apk
